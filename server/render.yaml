services:
  - type: web
    name: eduquest-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        value: ""
        sync: false
      - key: DATABASE_URL
        value: ""
        sync: false
